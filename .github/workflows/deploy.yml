name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Gate the deploy on the structural smoke suite + SEO head assertions.
      # Both assert against the dist/ the Build step just produced (no rebuild).
      # A green `astro build` does NOT prove a render (see AGENTS.md) — these
      # tests encode the render anchors, so nothing red can ship.
      - name: Test — smoke suite
        run: npm run test

      - name: Test — SEO head
        run: npm run test:seo

      # A11y gate: axe-core (WCAG 2.0/2.1 A+AA) over the same dist/ the Build
      # step produced, plus the pure-node palette contrast check. Chromium is
      # installed here (not in npm ci) so the browser download only costs the
      # deploy job, and `test:a11y:built` skips the rebuild `test:a11y` does.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Test — accessibility (axe + contrast)
        run: npm run test:a11y:built

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name subfolio-astro
